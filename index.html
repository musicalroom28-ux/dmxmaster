<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIGLIGHT DMX MASTER</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- ES Module Imports -->
  <script type="importmap">
    {
      "imports": {
        "react": "https://esm.sh/react@18.2.0",
        "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
        "lucide-react": "https://esm.sh/lucide-react@0.292.0"
      }
    }
  </script>

  <!-- Babel (JSX 컴파일러) -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- ✨ PDF 변환용 라이브러리 추가 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

  <!-- ✨ PWA 메타 태그 및 아이콘 설정 -->
  <meta name="theme-color" content="#242730">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DMX MASTER">
  <link rel="apple-touch-icon" href="data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%235b61df'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='120' font-family='sans-serif' font-weight='bold'%3EDMX%3C/text%3E%3C/svg%3E">

  <script>
    // ✨ PWA 동적 Manifest 생성 (단일 파일 앱을 위함)
    const manifestJSON = {
      name: "BIGLIGHT DMX MASTER",
      short_name: "DMX MASTER",
      description: "무대 조명 DMX 채널 패치 관리 앱",
      start_url: window.location.href,
      display: "standalone",
      background_color: "#242730",
      theme_color: "#242730",
      icons: [{
        src: "data:image/svg+xml;charset=utf-8,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='100' fill='%235b61df'/%3E%3Ctext x='50%25' y='50%25' dominant-baseline='middle' text-anchor='middle' fill='white' font-size='120' font-family='sans-serif' font-weight='bold'%3EDMX%3C/text%3E%3C/svg%3E",
        sizes: "512x512",
        type: "image/svg+xml",
        purpose: "any maskable"
      }]
    };
    const manifestBlob = new Blob([JSON.stringify(manifestJSON)], {type: 'application/manifest+json'});
    const link = document.createElement('link');
    link.rel = 'manifest';
    link.href = URL.createObjectURL(manifestBlob);
    document.head.appendChild(link);

    // ✨ PWA Service Worker (기본 캐싱/설치 트리거)
    if ('serviceWorker' in navigator) {
      const swCode = `
        self.addEventListener('install', e => self.skipWaiting());
        self.addEventListener('fetch', e => {}); 
      `;
      const swBlob = new Blob([swCode], {type: 'application/javascript'});
      navigator.serviceWorker.register(URL.createObjectURL(swBlob)).catch(err => console.log('SW (blob) disabled in this env.', err));
    }
  </script>

  <style>
    /* CSS 기반 복사 방지 */
    body { 
      margin: 0; 
      background-color: #242730; 
      color: #f8fafc; 
      -webkit-touch-callout: none; /* iOS Safari */
      -webkit-user-select: none; /* Safari */
      -khtml-user-select: none; /* Konqueror HTML */
      -moz-user-select: none; /* Old versions of Firefox */
      -ms-user-select: none; /* Internet Explorer/Edge */
      user-select: none; /* Non-prefixed version, currently supported by Chrome, Edge, Opera and Firefox */
    }
    
    /* input 필드 내에서는 텍스트 선택 허용 (입력을 위해) */
    input, textarea {
      -webkit-user-select: auto;
      user-select: auto;
    }
    
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
    
    /* ✨ 프린트 전용 페이지 여백 및 세팅 */
    @media print {
      @page { margin: 10mm; size: A4; }
      body { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    }
  </style>

  <!-- JavaScript 기반 보안 조치 -->
  <script>
    // 1. 우클릭 방지
    document.addEventListener('contextmenu', event => event.preventDefault());

    // 2. 텍스트 드래그(선택) 방지
    document.addEventListener('selectstart', event => {
      if(event.target.tagName !== 'INPUT' && event.target.tagName !== 'TEXTAREA') {
        event.preventDefault();
      }
    });

    // 3. 복사 기능(Ctrl+C) 방지
    document.addEventListener('copy', event => {
      if(event.target.tagName !== 'INPUT' && event.target.tagName !== 'TEXTAREA') {
        event.preventDefault();
      }
    });

    // 4. 드래그 방지
    document.addEventListener('dragstart', event => event.preventDefault());

    // 5. 주요 단축키 차단 (F12, Ctrl+U, Ctrl+Shift+I 등)
    document.addEventListener('keydown', event => {
      // F12 방지
      if (event.keyCode === 123) {
        event.preventDefault();
        return false;
      }
      // Ctrl+Shift+I (개발자 도구)
      if (event.ctrlKey && event.shiftKey && event.keyCode === 73) {
        event.preventDefault();
        return false;
      }
      // Ctrl+Shift+C (요소 검사)
      if (event.ctrlKey && event.shiftKey && event.keyCode === 67) {
        event.preventDefault();
        return false;
      }
      // Ctrl+Shift+J (콘솔)
      if (event.ctrlKey && event.shiftKey && event.keyCode === 74) {
        event.preventDefault();
        return false;
      }
      // Ctrl+U (소스 보기)
      if (event.ctrlKey && event.keyCode === 85) {
        event.preventDefault();
        return false;
      }
      // Ctrl+S (저장) - 웹페이지 저장을 막기 위함
      if (event.ctrlKey && event.keyCode === 83) {
        event.preventDefault();
        return false;
      }
    });

    // 6. 개발자 도구 강제 디버깅 루프 (Anti-Debugging)
    setInterval(function() {
      const before = new Date().getTime();
      debugger;
      const after = new Date().getTime();
      if (after - before > 100) {
        document.body.innerHTML = "보안 정책에 의해 페이지 접근이 차단되었습니다.";
      }
    }, 1000);
  </script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import React, { useState, useMemo, useRef, useCallback, useEffect } from 'react';
    import { createRoot } from 'react-dom/client';
    // ✨ PWA 설치를 위한 Smartphone 아이콘 추가
    import { Plus, X, Sparkles, Loader2, ArrowLeft, CheckCircle2, ListFilter, Printer, FileDown, Undo, Redo, Save, Upload, Smartphone } from 'lucide-react';

    // --- Gemini API Call ---
    const callGemini = async (prompt, systemInstruction = "You are a helpful assistant.", isJson = false) => {
      const apiKey = ""; // API Key is injected by the environment
      const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
      const payload = {
        contents: [{ parts: [{ text: prompt }] }],
        systemInstruction: { parts: [{ text: systemInstruction }] }
      };
      if (isJson) {
        payload.generationConfig = { responseMimeType: "application/json" };
      }

      let delay = 1000;
      for (let i = 0; i < 6; i++) {
        try {
          const res = await fetch(url, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
          if (!res.ok) throw new Error(`API Error: ${res.status}`);
          const data = await res.json();
          return data.candidates[0].content.parts[0].text;
        } catch (error) {
          if (i === 5) throw error;
          await new Promise(r => setTimeout(r, delay));
          delay *= 2;
        }
      }
    };

    const App = () => {
      const initialGroups = [{ id: Date.now(), name: '', location: '', universe: '0', channel: '0', offset: '0', quantity: '0' }];
      const [groups, setGroups] = useState(initialGroups);
      const [view, setView] = useState('form'); // 'form' | 'result'
      const [toastMsg, setToastMsg] = useState('');
      
      const [loadingLookup, setLoadingLookup] = useState(null);
      const [report, setReport] = useState('');
      const [loadingReport, setLoadingReport] = useState(false);

      // ✨ PWA 설치 상태 관리
      const [deferredPrompt, setDeferredPrompt] = useState(null);
      const [isInstallable, setIsInstallable] = useState(false);

      // ✨ Undo/Redo & 파일 업로드용 Refs
      const fileInputRef = useRef(null);
      const historyRef = useRef([initialGroups]);
      const historyIndexRef = useRef(0);
      const historyTimeoutRef = useRef(null);
      const [canUndo, setCanUndo] = useState(false);
      const [canRedo, setCanRedo] = useState(false);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      // --- 히스토리 (이전/다음 단계) 관리 로직 ---
      const pushHistory = useCallback((newGroups) => {
        const currentHist = historyRef.current;
        const currentIndex = historyIndexRef.current;
        
        // 상태가 완전히 동일하면 저장하지 않음
        if (currentIndex >= 0 && JSON.stringify(currentHist[currentIndex]) === JSON.stringify(newGroups)) return;

        const newHist = currentHist.slice(0, currentIndex + 1);
        newHist.push(newGroups);
        if (newHist.length > 50) newHist.shift(); // 최대 50단계 저장
        
        historyRef.current = newHist;
        historyIndexRef.current = newHist.length - 1;
        
        setCanUndo(historyIndexRef.current > 0);
        setCanRedo(false);
      }, []);

      const pushHistoryImmediate = useCallback((newGroups) => {
        clearTimeout(historyTimeoutRef.current);
        pushHistory(newGroups);
      }, [pushHistory]);

      const pushHistoryDebounced = useCallback((newGroups) => {
        clearTimeout(historyTimeoutRef.current);
        historyTimeoutRef.current = setTimeout(() => {
          pushHistory(newGroups);
        }, 500); // 0.5초 동안 입력이 멈추면 히스토리 저장
      }, [pushHistory]);

      const handleUndo = () => {
        if (historyIndexRef.current > 0) {
          clearTimeout(historyTimeoutRef.current);
          historyIndexRef.current -= 1;
          setGroups(historyRef.current[historyIndexRef.current]);
          setCanUndo(historyIndexRef.current > 0);
          setCanRedo(true);
          showToast("이전 단계로 되돌렸습니다.");
        }
      };

      const handleRedo = () => {
        if (historyIndexRef.current < historyRef.current.length - 1) {
          clearTimeout(historyTimeoutRef.current);
          historyIndexRef.current += 1;
          setGroups(historyRef.current[historyIndexRef.current]);
          setCanUndo(true);
          setCanRedo(historyIndexRef.current < historyRef.current.length - 1);
          showToast("다시 실행했습니다.");
        }
      };

      // 단축키 (Ctrl+Z / Ctrl+Y)
      useEffect(() => {
        const handleKeyDown = (e) => {
          const isInputFocused = ['INPUT', 'TEXTAREA'].includes(e.target.tagName);
          if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'z' && !isInputFocused) {
            e.preventDefault();
            if (e.shiftKey) handleRedo();
            else handleUndo();
          } else if ((e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'y' && !isInputFocused) {
            e.preventDefault();
            handleRedo();
          }
        };
        window.addEventListener('keydown', handleKeyDown);
        return () => window.removeEventListener('keydown', handleKeyDown);
      }, [canUndo, canRedo]);

      // ✨ PWA 앱 설치 프롬프트 이벤트 리스너 추가
      useEffect(() => {
        const handleBeforeInstallPrompt = (e) => {
          e.preventDefault();
          setDeferredPrompt(e);
          setIsInstallable(true);
        };
        window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
        window.addEventListener('appinstalled', () => {
          setIsInstallable(false);
          showToast("앱이 기기에 성공적으로 설치되었습니다!");
        });
        return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
      }, []);
      // ----------------------------------------

      // --- 데이터 저장 & 불러오기 로직 ---
      const handleSaveData = () => {
        const data = JSON.stringify(groups, null, 2);
        const blob = new Blob([data], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `BIGLIGHT_DMX_Save_${new Date().toISOString().slice(0, 10)}.json`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
        showToast("데이터가 파일로 저장되었습니다.");
      };

      const handleLoadData = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const data = JSON.parse(event.target.result);
            if (Array.isArray(data)) {
              setGroups(data);
              // 불러오기 시 히스토리 초기화
              historyRef.current = [data];
              historyIndexRef.current = 0;
              setCanUndo(false);
              setCanRedo(false);
              setView('form'); // 폼 화면으로 이동
              showToast("데이터를 성공적으로 불러왔습니다.");
            } else {
              showToast("유효하지 않은 파일 형식입니다.");
            }
          } catch (err) {
            showToast("파일을 읽는 중 오류가 발생했습니다.");
          }
        };
        reader.readAsText(file);
        e.target.value = null; // 같은 파일 재선택 허용
      };
      // ----------------------------------------

      const addGroup = () => {
        const lastGroup = groups[groups.length - 1];
        let nextUni = lastGroup ? Number(lastGroup.universe) || 0 : 0;
        let nextCh = lastGroup ? (Number(lastGroup.channel) || 0) + ((Number(lastGroup.offset) || 0) * (Number(lastGroup.quantity) || 0)) : 0;

        if (nextCh > 512) {
           nextUni += 1;
           nextCh = 0; 
        }

        const newGroups = [...groups, {
          id: Date.now(),
          name: '',
          location: '',
          universe: String(nextUni),
          channel: String(nextCh),
          offset: '0',
          quantity: '0'
        }];
        setGroups(newGroups);
        pushHistoryImmediate(newGroups); // 그룹 추가 즉시 히스토리 기록
      };

      const removeGroup = (id) => {
        const newGroups = groups.filter(g => g.id !== id);
        setGroups(newGroups);
        pushHistoryImmediate(newGroups);
      };

      const updateGroup = (id, field, value) => {
        const newGroups = groups.map(g => g.id === id ? { ...g, [field]: value } : g);
        setGroups(newGroups);
        pushHistoryDebounced(newGroups); // 텍스트 입력은 0.5초 디바운스로 기록
      };

      // ✨ Gemini: 장비 채널(Offset) 자동 검색
      const handleFindChannels = async (group) => {
        if (!group.name) {
          showToast("장비 이름을 먼저 입력해주세요.");
          return;
        }
        setLoadingLookup(group.id);
        try {
          const prompt = `조명기구 이름: "${group.name}". 이 무대 조명기의 가장 일반적인 DMX 채널 수(Footprint)를 찾아주세요. 
          예: "LED PAR 12ch" -> 12, "Mac Aura" -> 14 또는 25 (가장 기본 채널로 선택). 
          결과는 반드시 'offset'이라는 키를 가진 정수형 JSON 객체로만 반환하세요.`;
          
          const res = await callGemini(prompt, "You are a reliable stage lighting DMX footprint database. Return ONLY valid JSON.", true);
          const parsed = JSON.parse(res.replace(/```json|```/g, '').trim());
          
          if (parsed && parsed.offset) {
            const newGroups = groups.map(g => g.id === group.id ? { ...g, offset: String(parsed.offset) } : g);
            setGroups(newGroups);
            pushHistoryImmediate(newGroups);
            showToast(`✨ ${group.name}의 채널(${parsed.offset}ch)을 불러왔습니다!`);
          }
        } catch (e) {
          console.error(e);
          showToast("채널 정보를 불러오지 못했습니다. 직접 입력해주세요.");
        }
        setLoadingLookup(null);
      };

      const generateList = () => {
        if (groups.some(g => !g.name || !g.offset || !g.quantity)) {
          showToast("모든 그룹의 이름, 오프셋, 수량을 입력해주세요.");
          return;
        }
        setView('result');
        setReport('');
      };

      // 패치 리스트 계산 로직
      const patchResult = useMemo(() => {
        let results = [];
        groups.forEach(group => {
          let currentUni = Number(group.universe) || 0;
          let currentCh = Number(group.channel) || 0;
          let offset = Number(group.offset) || 0;
          let qty = Number(group.quantity) || 0;

          let fixtures = [];
          for (let i = 0; i < qty; i++) {
            // 유니버스 경계 512 채널을 넘어가면 다음 유니버스로 이동
            if (currentCh + offset - 1 > 512) {
               currentUni += 1;
               currentCh = 1; // 넘어가면 1부터 시작
            }
            fixtures.push({
               index: i + 1,
               universe: currentUni,
               start: currentCh,
               end: currentCh + offset - 1
            });
            currentCh += offset;
          }
          results.push({ ...group, fixtures });
        });
        return results;
      }, [groups]);

      // ✨ 추가된 전체 초기화 기능
      const handleReset = () => {
        if (window.confirm("모든 입력 내용을 지우고 처음부터 다시 시작하시겠습니까?")) {
          const newGroups = [{ id: Date.now(), name: '', location: '', universe: '0', channel: '0', offset: '0', quantity: '0' }];
          setGroups(newGroups);
          pushHistoryImmediate(newGroups);
          setView('form');
          showToast("전체 데이터가 초기화되었습니다.");
        }
      };

      // ✨ PDF 다운로드 기능 (A4 1장에 자동 맞춤)
      const handleDownloadPDF = async () => {
        showToast("PDF 파일을 생성하고 있습니다. 잠시만 기다려주세요...");
        try {
          const element = document.getElementById('patch-list-container');
          if (!element) return;
          
          const canvas = await window.html2canvas(element, {
            scale: 2,
            backgroundColor: '#242730',
            useCORS: true
          });
          
          const imgData = canvas.toDataURL('image/png');
          const { jsPDF } = window.jspdf;
          
          const pdf = new jsPDF('p', 'mm', 'a4');
          const pdfWidth = pdf.internal.pageSize.getWidth();
          const pdfHeight = pdf.internal.pageSize.getHeight();
          
          const margin = 10;
          let imgWidth = pdfWidth - (margin * 2);
          let imgHeight = (canvas.height * imgWidth) / canvas.width;
          
          const maxImgHeight = pdfHeight - (margin * 2);

          if (imgHeight > maxImgHeight) {
            const ratio = maxImgHeight / imgHeight;
            imgHeight = maxImgHeight;
            imgWidth = imgWidth * ratio;
          }
          
          const xPos = margin + ((pdfWidth - (margin * 2)) - imgWidth) / 2;
          
          pdf.addImage(imgData, 'PNG', xPos, margin, imgWidth, imgHeight);
          pdf.save(`BIGLIGHT_DMX_Patch_${new Date().toISOString().slice(0, 10)}.pdf`);
          showToast("PDF 파일 저장이 완료되었습니다!");
        } catch (error) {
          console.error("PDF generation error:", error);
          showToast("PDF 생성 중 오류가 발생했습니다.");
        }
      };

      // ✨ PWA 설치 핸들러
      const handleInstallApp = async () => {
        if (!deferredPrompt) return;
        deferredPrompt.prompt();
        const { outcome } = await deferredPrompt.userChoice;
        if (outcome === 'accepted') {
          setIsInstallable(false);
        }
        setDeferredPrompt(null);
      };

      return (
        <div className="min-h-screen font-sans">
          <div className="max-w-2xl mx-auto pt-10 pb-24 px-4 sm:px-6">
            
            {/* Header */}
            <div className="text-center mb-6 print:mb-4">
              <h1 className="text-3xl font-black text-slate-100 print:text-black mb-3 tracking-tight">BIGLIGHT DMX MASTER</h1>
            </div>

            {/* ✨ 저장/불러오기/Undo/Redo 툴바 */}
            <div className="flex justify-center items-center gap-2 mb-8 print:hidden">
              <button 
                onClick={handleUndo} 
                disabled={!canUndo} 
                className="p-2 bg-[#2b2f3a] text-slate-400 hover:text-white rounded-lg border border-slate-700 disabled:opacity-30 disabled:hover:text-slate-400 transition-colors" 
                title="실행 취소 (Ctrl+Z)"
              >
                <Undo size={16} />
              </button>
              <button 
                onClick={handleRedo} 
                disabled={!canRedo} 
                className="p-2 bg-[#2b2f3a] text-slate-400 hover:text-white rounded-lg border border-slate-700 disabled:opacity-30 disabled:hover:text-slate-400 transition-colors" 
                title="다시 실행 (Ctrl+Y)"
              >
                <Redo size={16} />
              </button>
              <div className="w-px h-6 bg-slate-700 mx-1"></div>
              <button 
                onClick={handleSaveData} 
                className="flex items-center gap-2 px-3 py-2 bg-[#2b2f3a] text-indigo-300 hover:text-indigo-200 hover:bg-[#343945] rounded-lg border border-indigo-500/30 transition-colors text-xs font-bold shadow-sm" 
                title="현재 데이터를 JSON 파일로 PC/모바일에 저장"
              >
                <Save size={16} /> 목록 저장
              </button>
              <button 
                onClick={() => fileInputRef.current.click()} 
                className="flex items-center gap-2 px-3 py-2 bg-[#2b2f3a] text-indigo-300 hover:text-indigo-200 hover:bg-[#343945] rounded-lg border border-indigo-500/30 transition-colors text-xs font-bold shadow-sm" 
                title="저장했던 JSON 파일을 불러오기"
              >
                <Upload size={16} /> 불러오기
              </button>
              
              {/* ✨ PWA 설치 버튼 노출 (브라우저가 지원할 때만 나타남) */}
              {isInstallable && (
                <>
                  <div className="w-px h-6 bg-slate-700 mx-1"></div>
                  <button 
                    onClick={handleInstallApp} 
                    className="flex items-center gap-2 px-3 py-2 bg-gradient-to-r from-indigo-600 to-purple-600 text-white hover:from-indigo-500 hover:to-purple-500 rounded-lg border border-indigo-400 transition-colors text-xs font-bold shadow-[0_0_10px_rgba(99,102,241,0.4)] animate-pulse" 
                    title="이 웹사이트를 스마트폰이나 PC 바탕화면 앱으로 설치합니다"
                  >
                    <Smartphone size={16} /> 앱 설치
                  </button>
                </>
              )}
              
              {/* 숨겨진 파일 업로드 인풋 */}
              <input type="file" ref={fileInputRef} hidden accept=".json" onChange={handleLoadData} />
            </div>

            {toastMsg && (
              <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-indigo-500 text-white px-6 py-3 rounded-xl text-sm font-bold shadow-lg shadow-indigo-500/20 z-50 animate-in fade-in slide-in-from-top-4 print:hidden">
                {toastMsg}
              </div>
            )}

            {view === 'form' ? (
              <div className="space-y-4">
                {groups.map((group, index) => (
                  <div key={group.id} className="relative border border-slate-700 bg-[#2b2f3a] rounded-xl p-5 sm:p-6 shadow-lg">
                    {groups.length > 1 && (
                      <button 
                        onClick={() => removeGroup(group.id)} 
                        className="absolute top-4 right-4 text-slate-500 hover:text-red-400 transition-colors"
                      >
                        <X size={20} />
                      </button>
                    )}

                    <div className="mb-5 pr-6">
                      <label className="block text-[11px] font-bold text-slate-400 mb-2">장비/그룹 이름</label>
                      <div className="flex gap-2">
                        <input
                          value={group.name}
                          onChange={(e) => updateGroup(group.id, 'name', e.target.value)}
                          className="flex-1 bg-[#343945] border border-slate-600 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors w-full"
                          placeholder="예: LED PAR 12ch"
                        />
                      </div>
                    </div>

                    <div className="mb-5 pr-6">
                      <label className="block text-[11px] font-bold text-slate-400 mb-2">장비 위치 (Location)</label>
                      <input
                        value={group.location}
                        onChange={(e) => updateGroup(group.id, 'location', e.target.value)}
                        className="w-full bg-[#343945] border border-slate-600 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors"
                        placeholder="예: LX1, LX2, LX3..."
                      />
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-5">
                      <div>
                        <label className="block text-[11px] font-bold text-slate-400 mb-2">시작 유니버스</label>
                        <input 
                          type="number" 
                          min="0"
                          value={group.universe} 
                          onChange={(e) => updateGroup(group.id, 'universe', e.target.value)} 
                          className="w-full bg-[#343945] border border-slate-600 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors" 
                        />
                      </div>
                      <div>
                        <label className="block text-[11px] font-bold text-slate-400 mb-2">시작 채널</label>
                        <input 
                          type="number" 
                          min="0"
                          value={group.channel} 
                          onChange={(e) => updateGroup(group.id, 'channel', e.target.value)} 
                          className="w-full bg-[#343945] border border-slate-600 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors" 
                        />
                      </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4">
                      <div>
                        <label className="block text-[11px] font-bold text-slate-400 mb-2">사용 채널 (OFFSET)</label>
                        <input 
                          type="number" 
                          min="0"
                          value={group.offset} 
                          onChange={(e) => updateGroup(group.id, 'offset', e.target.value)} 
                          className="w-full bg-[#343945] border border-slate-600 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors" 
                        />
                      </div>
                      <div>
                        <label className="block text-[11px] font-bold text-slate-400 mb-2">수량 (FIXTURES)</label>
                        <input 
                          type="number" 
                          min="0"
                          value={group.quantity} 
                          onChange={(e) => updateGroup(group.id, 'quantity', e.target.value)} 
                          className="w-full bg-[#343945] border border-slate-600 rounded-lg p-3 text-sm text-slate-200 outline-none focus:border-indigo-500 transition-colors" 
                        />
                      </div>
                    </div>
                  </div>
                ))}

                <div className="grid grid-cols-2 gap-3 mt-6">
                  <button onClick={addGroup} className="py-3.5 sm:py-4 bg-[#343946] hover:bg-[#3f4555] border border-slate-600/50 text-slate-200 rounded-xl font-bold flex items-center justify-center gap-2 transition-colors">
                    <Plus size={18} /> 조명기 추가
                  </button>
                  <button onClick={generateList} className="py-3.5 sm:py-4 bg-[#5b61df] hover:bg-[#6c72ef] text-white rounded-xl font-bold flex items-center justify-center gap-2 transition-colors shadow-lg shadow-indigo-500/20">
                    채널 생성 <CheckCircle2 size={18} />
                  </button>
                </div>

                {/* ✨ 초기화 버튼 영역 */}
                <div className="mt-4 flex justify-center">
                  <button onClick={handleReset} className="text-xs text-yellow-500 hover:text-yellow-400 transition-colors underline underline-offset-4 font-bold">
                    초기화
                  </button>
                </div>

                {/* ✨ 저작권 경고 문구 */}
                <div className="mt-8 text-center text-[10px] text-slate-500/70 tracking-wide">
                  ※ 본 콘텐츠의 무단 복제 및 배포를 금함
                </div>
              </div>
            ) : (
              <div className="space-y-6 animate-in fade-in zoom-in-95 duration-200">
                <div className="flex items-center justify-between mb-4 print:hidden">
                  <button onClick={() => setView('form')} className="text-slate-400 hover:text-white flex items-center gap-2 transition-colors font-bold text-sm bg-slate-800 px-4 py-2 rounded-lg border border-slate-700">
                    <ArrowLeft size={16} /> 수정하기
                  </button>
                  
                  {/* ✨ 툴바: PDF 저장 버튼 / 프린트 버튼 */}
                  <div className="flex items-center gap-2">
                    <div className="hidden sm:flex items-center gap-1.5 text-indigo-400 font-bold text-sm mr-2">
                      <ListFilter size={18} /> 패치 완료
                    </div>
                    <button 
                      onClick={handleDownloadPDF} 
                      className="text-white flex items-center gap-1.5 transition-colors font-bold text-sm bg-rose-600 hover:bg-rose-500 px-3 sm:px-4 py-2 rounded-lg shadow-lg shadow-rose-500/20"
                    >
                      <FileDown size={16} /> <span className="hidden sm:inline">PDF</span>
                    </button>
                    <button 
                      onClick={() => window.print()} 
                      className="text-white flex items-center gap-1.5 transition-colors font-bold text-sm bg-indigo-600 hover:bg-indigo-500 px-3 sm:px-4 py-2 rounded-lg shadow-lg shadow-indigo-500/20"
                    >
                      <Printer size={16} /> <span className="hidden sm:inline">프린트</span>
                    </button>
                  </div>
                </div>

                {/* PDF 캡처 대상 영역 */}
                <div id="patch-list-container" className="bg-[#242730] print:bg-white pb-4 print:pb-0">
                  {/* 프린트 시에만 상단에 나타나는 타이틀 (여백 압축) */}
                  <div className="hidden print:block text-xl print:text-lg font-black text-black border-b-2 border-black pb-2 print:pb-1 mb-6 print:mb-2">
                    DMX 패치 리스트 (Patch List)
                  </div>

                  {patchResult.map((group, gIdx) => (
                    <div key={gIdx} className="bg-[#2b2f3a] print:bg-white rounded-xl p-5 sm:p-6 print:p-2 border border-slate-700 print:border-gray-400 shadow-xl print:shadow-none relative overflow-hidden print:break-inside-avoid print:mb-2 mb-6">
                      {/* print: 속성을 부여하여 출력 시에만 배경 하얗게, 글자 검게 되도록 처리 */}
                      <div className="absolute top-0 left-0 w-1 h-full bg-indigo-500 print:bg-black"></div>
                      <h3 className="text-lg print:text-sm font-bold text-slate-100 print:text-black mb-1 print:mb-0">
                        {group.location && <span className="text-indigo-400 print:text-gray-600 mr-2">[{group.location}]</span>}
                        {group.name || '이름 없음'}
                      </h3>
                      <p className="text-xs print:text-[10px] text-slate-400 print:text-gray-600 mb-4 print:mb-1 font-mono">{group.offset}채널 × {group.quantity}대</p>
                      
                      {/* 프린트 시 가로 6개씩 빽빽하게 배치 (여백 최소화) */}
                      <div className="grid grid-cols-2 sm:grid-cols-4 print:grid-cols-6 gap-2.5 print:gap-1">
                        {group.fixtures.map(f => (
                          <div key={f.index} className="bg-[#1f222a] print:bg-white p-3 print:p-1 rounded-lg text-center border border-slate-700/50 print:border-gray-400 flex flex-col justify-center items-center">
                             <div className="text-[10px] print:text-[8px] font-bold text-slate-500 print:text-gray-500 mb-1 print:mb-0">장비 #{f.index}</div>
                             <div className="font-mono text-[15px] print:text-xs text-indigo-300 print:text-black font-black tracking-wider">
                                <span className="text-slate-400 print:text-gray-500">{f.universe}.</span>{String(f.start).padStart(3, '0')}
                             </div>
                          </div>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
